<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparador Acacías</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">Comparador Acacías</a>
    </div>
  </nav>

  <!-- Clima -->
  <section id="clima" class="container my-4">
    <h2 class="mb-3">Clima en Acacías</h2>
    <div id="weather" class="alert alert-info">Cargando clima...</div>
  </section>

  <!-- Comparador -->
  <section id="comparador" class="container my-4">
    <h2 class="mb-3">Comparador de Precios</h2>
    <div id="comparador-precios" class="row"></div>
  </section>

  <!-- Videos (penúltimos) -->
  <section id="videos" class="container my-4">
    <h2 class="mb-3">Videos</h2>
    <div id="video-gallery" class="row"></div>
  </section>

  <!-- Noticias (anomalias al final) -->
  <section id="anomalias" class="container my-4">
    <h2 class="mb-3">Noticias en Vivo</h2>
    <div id="anomalias-container" class="row"></div>
  </section>

  <!-- Footer opcional -->
  <footer>
    <p>© 2026 Comparador Acacías | Proyecto comunitario</p>
  </footer>

  <!-- Scripts -->
  <script src="config.js"></script>
  <script>
    // Clima
    async function cargarClima() {
      try {
        const resp = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=Acacias,CO&appid=${config.OPENWEATHER_KEY}&units=metric&lang=es`);
        const data = await resp.json();
        document.getElementById("weather").innerHTML =
          `Temperatura: ${data.main.temp}°C, ${data.weather[0].description}`;
      } catch {
        document.getElementById("weather").innerHTML = "Error cargando clima";
      }
    }

    // Comparador
    async function cargarComparador() {
      try {
        const resp = await fetch("data.json");
        const data = await resp.json();
        const cont = document.getElementById("comparador-precios");
        cont.innerHTML = "";
        data.forEach(item => {
          cont.innerHTML += `
            <div class="col-md-4 mb-3">
              <div class="card h-100">
                <div class="card-body">
                  <h5 class="card-title">${item.producto}</h5>
                  <p class="card-text">Precio: ${item.precio}</p>
                  <p class="card-text">Lugar: ${item.lugar}</p>
                </div>
              </div>
            </div>`;
        });
      } catch {
        document.getElementById("comparador-precios").innerHTML = "Error cargando comparador";
      }
    }

    // Videos
    async function cargarVideos() {
      try {
        const resp = await fetch("videos/videos.json");
        const data = await resp.json();
        const cont = document.getElementById("video-gallery");
        cont.innerHTML = "";
        data.forEach(video => {
          cont.innerHTML += `
            <div class="col-md-4 mb-3">
              <div class="card h-100">
                <video class="card-img-top" controls>
                  <source src="videos/${video}" type="video/mp4">
                </video>
              </div>
            </div>`;
        });
      } catch {
        document.getElementById("video-gallery").innerHTML = "Error cargando videos";
      }
    }

    // Noticias
    async function cargarAnomalias() {
      try {
        const resp = await fetch("https://mi-comparador-wed.onrender.com/api/noticias");
        const data = await resp.json();
        const cont = document.getElementById("anomalias-container");
        cont.innerHTML = "";
        data.articles.forEach(noticia => {
          cont.innerHTML += `
            <div class="col-md-4 mb-3">
              <div class="card h-100">
                ${noticia.urlToImage ? `<img src="${noticia.urlToImage}" class="card-img-top" alt="imagen noticia">` : ""}
                <div class="card-body">
                  <h5 class="card-title">${noticia.title}</h5>
                  <p class="card-text">${noticia.description || ''}</p>
                  <a href="${noticia.url}" target="_blank" class="btn btn-outline-warning">Leer más</a>
                </div>
              </div>
            </div>`;
        });
        // Hora de actualización
        const ahora = new Date().toLocaleTimeString();
        cont.innerHTML = `<p class="text-muted">Última actualización: ${ahora}</p>` + cont.innerHTML;
      } catch {
        document.getElementById("anomalias-container").innerHTML = "Error cargando noticias";
      }
    }

    // Inicializar
    cargarClima();
    cargarComparador();
    cargarVideos();
    cargarAnomalias();
    setInterval(cargarAnomalias, 300000); // refrescar cada 5 minutos
  </script>
</body>
</html>
