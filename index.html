<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Comparador Acacías</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap y Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">🌐 Comparador Acacías</a>
    </div>
  </nav>

  <div class="container mt-5 pt-4">

    <!-- Clima -->
    <section class="my-5">
      <h2 class="text-center text-primary mb-3"><i class="bi bi-cloud-sun"></i> Clima en Acacías</h2>
      <div id="clima" class="card p-4 shadow text-center">
        <p>Cargando clima...</p>
      </div>
    </section>

    <!-- Comparador -->
    <section class="my-5">
      <h2 class="text-center text-success mb-3"><i class="bi bi-cash-stack"></i> Comparador de Precios</h2>
      <table class="table table-striped table-hover shadow">
        <thead class="table-dark">
          <tr>
            <th>Servicio</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Contacto</th>
          </tr>
        </thead>
        <tbody id="tabla-precios">
          <!-- Se llena dinámicamente desde data.json -->
        </tbody>
      </table>
    </section>

    <!-- Anomalías -->
    <section class="my-5">
      <h2 class="text-center text-danger mb-3"><i class="bi bi-exclamation-triangle"></i> Anomalías en Acacías</h2>
      <div id="anomalias" class="row g-3">
        <p>Cargando anomalías...</p>
      </div>
    </section>

    <!-- Galería de Videos -->
    <section class="my-5">
      <h2 class="text-center text-info mb-3"><i class="bi bi-film"></i> Videos</h2>
      <div id="carouselVideos" class="carousel slide shadow" data-bs-ride="carousel" data-bs-interval="false">
        <div class="carousel-inner">
          <div class="carousel-item active">
            <video class="d-block w-100" controls autoplay>
              <source src="videos/video1.mp4" type="video/mp4">
              Tu navegador no soporta video.
            </video>
          </div>
          <div class="carousel-item">
            <video class="d-block w-100" controls>
              <source src="videos/video2.mp4" type="video/mp4">
            </video>
          </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselVideos" data-bs-slide="prev">
          <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselVideos" data-bs-slide="next">
          <span class="carousel-control-next-icon"></span>
        </button>
      </div>
    </section>

  </div>

  <!-- Scripts -->
  <script src="weather-config.js"></script>
  <script>
    // Clima
    async function cargarClima() {
      const lat = 3.986;   // Coordenadas de Acacías
      const lon = -73.765;
      const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=es&appid=${OPENWEATHER_KEY}`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        document.getElementById("clima").innerHTML = `
          <h4>${data.weather[0].description.toUpperCase()}</h4>
          <p>🌡️ Temperatura: <b>${data.main.temp} °C</b></p>
          <p>💧 Humedad: <b>${data.main.humidity}%</b></p>
          <p>🤒 Sensación térmica: <b>${data.main.feels_like} °C</b></p>
          <p>💨 Viento: <b>${data.wind.speed} km/h</b></p>
        `;
      } catch (error) {
        document.getElementById("clima").innerHTML = "<p class='text-danger'>Error cargando clima</p>";
      }
    }
    cargarClima();

    // Precios
    fetch("data.json")
      .then(res => res.json())
      .then(data => {
        const tabla = document.getElementById("tabla-precios");
        data.forEach(item => {
          tabla.innerHTML += `
            <tr>
              <td>${item.servicio}</td>
              <td>${item.nombre}</td>
              <td class="text-success fw-bold">${item.precio}</td>
              <td>${item.contacto}</td>
            </tr>
          `;
        });
      });

    // Anomalías: alerta meteorológica + noticias RSS
    async function cargarAnomalias() {
      const cont = document.getElementById("anomalias");
      cont.innerHTML = "";

      // Alerta meteorológica
      try {
        const lat = 3.986, lon = -73.765;
        const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=es&appid=${OPENWEATHER_KEY}`;
        const res = await fetch(url);
        const clima = await res.json();
        if (clima.weather[0].main.toLowerCase().includes("rain") || clima.weather[0].main.toLowerCase().includes("storm")) {
          cont.innerHTML += `
            <div class="col-md-4">
              <div class="card border-danger shadow h-100">
                <div class="card-body">
                  <h5 class="card-title text-danger"><i class="bi bi-cloud-lightning"></i> Alerta Meteorológica</h5>
                  <p class="card-text">Condiciones de tormenta/lluvia detectadas en Acacías.</p>
                  <span class="badge bg-danger">Nivel: Alto</span>
                </div>
              </div>
            </div>`;
        }
      } catch (e) {
        console.log("Error clima:", e);
      }

      // Noticias vía rss2json
      try {
        const rssUrl = "https://caracol.com.co/rss/";
        const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&api_key=gelyisdioqkyv56lb5gzgxjh2f7xi5syrkfjpzoh`;
        const res = await fetch(apiUrl);
        const data = await res.json();

        let count = 0;
        data.items.forEach((item) => {
          const titulo = item.title;
          const desc = item.description;

          if ((titulo.includes("Meta") || titulo.includes("bogota") || desc.includes("colombia") || desc.includes("Villavicencio")) && count < 5) {
            cont.innerHTML += `
              <div class="col-md-4">
                <div class="card border-warning shadow h-100">
                  <div class="card-body">
                    <h5 class="card-title text-warning"><i class="bi bi-newspaper"></i> ${titulo}</h5>
                    <p class="card-text">${desc}</p>
                    <span class="badge bg-warning">Fuente: Caracol RSS</span>
                  </div>
                </div>
              </div>`;
            count++;
          }
        });

        if (count === 0) {
          cont.innerHTML = "<p class='text-muted'>No se encontraron noticias de Meta o Acacías</p>";
        }

      } catch (e) {
        cont.innerHTML = "<p class='text-muted'>No se pudo cargar noticias RSS</p>";
      }
    }

    // Refrescar automáticamente cada minuto
    setInterval(cargarAnomalias, 60000);
    cargarAnomalias();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
