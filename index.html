    <!-- Noticias (últimas) -->
    <section class="my-5">
      <h2 class="text-center mb-3" style="color:#0b1a33;"><i class="bi bi-newspaper"></i> NOTICIAS</h2>
      <div id="anomalias" class="row g-3">

  <!-- Scripts -->
  <script src="weather-config.js"></script>
  <script>
    // --- CLIMA ---
    async function cargarClima() {
      const cont = document.getElementById("clima");
      cont.innerHTML = "<p class='text-muted'>Cargando clima...</p>";

      if (typeof OPENWEATHER_KEY === "undefined" || !OPENWEATHER_KEY) {
        cont.innerHTML = "<p class='text-danger'>Clave de OpenWeather no encontrada</p>";
        return;
      }

      const lat = 3.986;   // Coordenadas de Acacías
      const lon = -73.765;
      const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=es&appid=${OPENWEATHER_KEY}`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        cont.innerHTML = `
          <h4 class="text-capitalize">${data.weather[0].description}</h4>
          <p>🌡️ Temperatura: <b>${data.main.temp} °C</b></p>
          <p>💧 Humedad: <b>${data.main.humidity}%</b></p>
          <p>🤒 Sensación térmica: <b>${data.main.feels_like} °C</b></p>
          <p>💨 Viento: <b>${data.wind.speed} m/s</b></p>
        `;
      } catch (error) {
        cont.innerHTML = "<p class='text-danger'>Error cargando clima</p>";
      }
    }
    cargarClima();
    // --- COMPARADOR ---
  async function cargarComparador() {
  const cont = document.getElementById("comparador-precios");
  cont.innerHTML = "<p class='text-muted text-center'>Cargando comparador...</p>";

  try {
    const res = await fetch("data.json");
    if (!res.ok) throw new Error("No se encontró data.json");
    const data = await res.json();

    cont.innerHTML = "";
    data.forEach(item => {
      let precioHTML = "";

      // Definir ícono según servicio
      let icono = "🍽️"; // por defecto restaurante
      if (item.servicio === "Gimnasio") icono = "💪";
      else if (item.servicio === "Hotel") icono = "🏨";
      else if (item.servicio === "Domicilios") icono = "🚚";
      else if (item.servicio === "Fruber") icono = "🍎";

      if (item.menu && Array.isArray(item.menu)) {
        precioHTML = "<ul class='list-unstyled'>";
        item.menu.forEach(m => {
          // tomar cualquier campo distinto de precio
          const keys = Object.keys(m).filter(k => k !== "precio");
          const nombre = keys.length > 0 ? m[keys[0]] : "Producto/servicio";
          const precio = m.precio && m.precio.trim() !== "" ? m.precio : "Consultar en el local";
          precioHTML += `<li>${icono} ${nombre} — <b>${precio}</b></li>`;
        });
        precioHTML += "</ul>";
      } else {
        const precio = item.precio ? item.precio : "Consultar en el local";
        precioHTML = `<p class="text-success fw-bold">${icono} ${precio}</p>`;
      }

      cont.innerHTML += `
        <div class="col-md-4">
          <div class="card h-100 shadow">
            <div class="card-body d-flex flex-column">
              <h5 class="card-title text-primary">${item.nombre}</h5>
              <p class="card-subtitle mb-2 text-muted">${item.servicio}</p>
              <div class="flex-grow-1">${precioHTML}</div>
              <p class="mt-3 text-muted">🌐 ${item.contacto}</p>
            </div>
          </div>
        </div>
      `;
    });
  } catch (e) {
    cont.innerHTML = "<p class='text-danger text-center'>Error cargando comparador</p>";
    console.error("Error cargarComparador:", e);
  }
}
cargarComparador();


        cargarComparador();

    // --- NOTICIAS DESDE BACKEND ---
    async function cargarAnomalias() {
      const cont = document.getElementById("anomalias");
      cont.innerHTML = "<p class='text-muted'>Cargando noticias...</p>";

      try {
        const res = await fetch("https://mi-comparador-wed.onrender.com/api/noticias");
        const data = await res.json();

        cont.innerHTML = "";
        if (!data.articles || data.articles.length === 0) {
          cont.innerHTML = "<p class='text-muted'>No se encontraron noticias</p>";
          return;
        }

        data.articles.slice(0, 6).forEach(noticia => {
          cont.innerHTML += `
            <div class="col-md-4">
              <div class="card border-0 shadow h-100">
                ${noticia.urlToImage ? `<img src="${noticia.urlToImage}" class="card-img-top" alt="imagen noticia">` : ""}
                <div class="card-body d-flex flex-column">
                  <h5 class="card-title text-dark"><i class="bi bi-newspaper"></i> ${noticia.title}</h5>
                  <p class="card-text flex-grow-1">${noticia.description || ""}</p>
                  <a href="${noticia.url}" target="_blank" class="btn btn-sm mt-auto" style="background-color:#0b1a33; color:#fff;">Leer más</a>
                </div>
              </div>
            </div>
          `;
        });

        const ahora = new Date().toLocaleTimeString();
        document.getElementById("ultima-actualizacion").innerText = "Última actualización: " + ahora;

      } catch (e) {
        cont.innerHTML = "<p class='text-muted'>No se pudo cargar noticias</p>";
        console.error("Error cargarAnomalias:", e);
      }
    }
    cargarAnomalias();
    setInterval(cargarAnomalias, 60000);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
