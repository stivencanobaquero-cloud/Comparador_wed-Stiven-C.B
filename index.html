<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Comparador Acacías</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap y Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">🌐 Comparador Acacías</a>
    </div>
  </nav>

  <div class="container mt-5 pt-4">

    <!-- Clima -->
    <section class="my-5">
      <h2 class="text-center text-primary mb-3"><i class="bi bi-cloud-sun"></i> Clima en Acacías</h2>
      <div id="clima" class="card p-4 shadow text-center">
        <p>Cargando clima...</p>
      </div>
    </section>

    <!-- Comparador -->
    <section class="my-5">
      <h2 class="text-center text-success mb-3"><i class="bi bi-cash-stack"></i> Comparador de Precios</h2>
      <table class="table table-striped table-hover shadow">
        <thead class="table-dark">
          <tr>
            <th>Servicio</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Contacto</th>
          </tr>
        </thead>
        <tbody id="tabla-precios">
          <tr><td colspan="4" class="text-center text-muted">Cargando comparador...</td></tr>
        </tbody>
      </table>
    </section>

    <!-- Noticias -->
    <section class="my-5">
      <h2 class="text-center text-danger mb-3"><i class="bi bi-exclamation-triangle"></i> Noticias en Español</h2>
      <div id="anomalias" class="row g-3">
        <p class="text-muted">Cargando noticias...</p>
      </div>
    </section>

    <!-- Videos -->
    <section class="my-5">
      <h2 class="text-center text-info mb-3"><i class="bi bi-film"></i> Videos</h2>
      <div class="row g-4">
        <div class="col-md-6">
          <div class="card shadow">
            <video class="card-img-top" controls autoplay muted loop>
              <source src="videos/video1.mp4" type="video/mp4">
              Tu navegador no soporta video.
            </video>
            <div class="card-body text-center">
              <h5 class="card-title">Video 1</h5>
            </div>
          </div>
        </div>
        <div class="col-md-6">
          <div class="card shadow">
            <video class="card-img-top" controls autoplay muted loop>
              <source src="videos/video2.mp4" type="video/mp4">
              Tu navegador no soporta video.
            </video>
            <div class="card-body text-center">
              <h5 class="card-title">Video 2</h5>
            </div>
          </div>
        </div>
      </div>
    </section>

  </div>

  <!-- Scripts -->
  <script src="weather-config.js"></script>
  <script>
    // --- CLIMA ---
    async function cargarClima() {
      const cont = document.getElementById("clima");
      cont.innerHTML = "<p class='text-muted'>Cargando clima...</p>";

      if (typeof OPENWEATHER_KEY === "undefined" || !OPENWEATHER_KEY) {
        cont.innerHTML = "<p class='text-danger'>Clave de OpenWeather no encontrada</p>";
        return;
      }

      const lat = 3.986;   // Coordenadas de Acacías
      const lon = -73.765;
      const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&units=metric&lang=es&appid=${OPENWEATHER_KEY}`;

      try {
        const res = await fetch(url);
        const data = await res.json();
        cont.innerHTML = `
          <h4 class="text-capitalize">${data.weather[0].description}</h4>
          <p>🌡️ Temperatura: <b>${data.main.temp} °C</b></p>
          <p>💧 Humedad: <b>${data.main.humidity}%</b></p>
          <p>🤒 Sensación térmica: <b>${data.main.feels_like} °C</b></p>
          <p>💨 Viento: <b>${data.wind.speed} m/s</b></p>
        `;
      } catch (error) {
        cont.innerHTML = "<p class='text-danger'>Error cargando clima</p>";
      }
    }
    cargarClima();

    // --- COMPARADOR ---
    async function cargarComparador() {
      const tabla = document.getElementById("tabla-precios");
      try {
        const res = await fetch("data.json");
        const data = await res.json();
        tabla.innerHTML = "";
        data.forEach(item => {
          tabla.innerHTML += `
            <tr>
              <td>${item.servicio}</td>
              <td>${item.nombre}</td>
              <td class="text-success fw-bold">${item.precio}</td>
              <td>${item.contacto}</td>
            </tr>
          `;
        });
      } catch (e) {
        tabla.innerHTML = "<tr><td colspan='4' class='text-danger text-center'>Error cargando comparador</td></tr>";
      }
    }
    cargarComparador();

    // --- NOTICIAS EN VIVO (NewsAPI con language=es y filtro Colombia) ---
    async function cargarAnomalias() {
      const cont = document.getElementById("anomalias");
      cont.innerHTML = "<p class='text-muted'>Cargando noticias...</p>";

      try {
        // Noticias generales en español
        let url = `https://newsapi.org/v2/top-headlines?language=es&apiKey=ddd3a8123a8648a9a6a1bb13009c68ee`;
        let res = await fetch(url);
        let data = await res.json();

        // Filtrar primero las que mencionen Colombia
        let articulos = [];
        if (data.articles && data.articles.length > 0) {
          articulos = data.articles.filter(a =>
            a.title.toLowerCase().includes("colombia") ||
            (a.description && a.description.toLowerCase().includes("colombia"))
          );
        }

        // Si no hay artículos de Colombia, mostrar los generales en español
        if (articulos.length === 0 && data.articles) {
          articulos = data.articles;
        }

        cont.innerHTML = "";
        if (!articulos || articulos.length === 0) {
          cont.innerHTML = "<p class='text-muted'>No se encontraron noticias</p>";
          return;
        }

        articulos.slice(0, 6).forEach(noticia => {
          cont.innerHTML += `
            <div class="col-md-4">
              <div class="card border-warning shadow h-100">
                <div class="card-body d-flex flex-column">
                  <h5 class="card-title text-warning"><i class="bi bi-newspaper"></i> ${noticia.title}</h5>
                  <p class="card-text flex-grow-1">${noticia.description || ""}</p>
                  <a href="${noticia.url}" target="_blank" class="btn btn-sm btn-outline-warning mt-auto">Leer más</a>
                </div>
              </div>
            </div>
          `;
        });
      } catch (e) {
        cont.innerHTML = "<p class='text-muted'>No se pudo cargar noticias</p>";
        console.error("Error cargarAnomalias:", e);
      }
    }
    cargarAnomalias();
    setInterval(cargarAnomalias, 60000);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
