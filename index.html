<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Comparador Acacías</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap y Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary fixed-top shadow">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#">🌐 Comparador Acacías</a>
    </div>
  </nav>

  <main class="container mt-5 pt-4">

    <!-- Clima -->
    <section class="my-5">
      <h2 class="text-center text-primary mb-3"><i class="bi bi-cloud-sun"></i> Clima en Acacías</h2>
      <div id="clima" class="card p-4 shadow text-center">
        <p>Cargando clima...</p>
      </div>
    </section>

    <!-- Guía Económica -->
    <section class="my-5">
      <h2 class="text-center text-success mb-3"><i class="bi bi-cash-stack"></i> Guía Económica de Acacías</h2>
      <div id="comparador-precios" class="row g-4">
        <p class="text-muted text-center">Cargando comparador...</p>
      </div>
    </section>

    <!-- Videos (penúltimos) -->
    <section class="row">
      <!-- Video 1 (local con controles limpios) -->
      <div class="col-md-6">
        <div class="card shadow">
          <div class="video-container">
            <video controls>
              <source src="videos/video1.mp4" type="video/mp4">
              Tu navegador no soporta la reproducción de video.
            </video>
          </div>
          <div class="card-body text-center">
            <h5 class="card-title">Video 1</h5>
          </div>
        </div>
      </div>

      <!-- Video 2 -->
      <div class="col-md-6">
        <div class="card shadow">
          <div class="video-container">
            <iframe src="https://drive.google.com/file/d/1La_vYn4WtOxQ8US-9lpdzEt3Mk5364vS/preview"></iframe>
          </div>
          <div class="card-body text-center">
            <h5 class="card-title">Video 2</h5>
          </div>
        </div>
      </div>

      <!-- Video 3 (link corregido) -->
      <div class="col-md-6">
        <div class="card shadow">
          <div class="video-container">
            <iframe src="https://drive.google.com/file/d/1kvALWRSwuVBAYxV0q7lv3XeEV3Hev0ln/preview"></iframe>
          </div>
          <div class="card-body text-center">
            <h5 class="card-title">Video 3</h5>
          </div>
        </div>
      </div>

      <!-- Video 4 -->
      <div class="col-md-6">
        <div class="card shadow">
          <div class="video-container">
            <iframe src="https://drive.google.com/file/d/ID_VIDEO4/preview"></iframe>
          </div>
          <div class="card-body text-center">
            <h5 class="card-title">Video 4</h5>
          </div>
        </div>
      </div>

      <!-- Video 5 -->
      <div class="col-md-6">
        <div class="card shadow">
          <div class="video-container">
            <iframe src="https://drive.google.com/file/d/ID_VIDEO5/preview"></iframe>
          </div>
          <div class="card-body text-center">
            <h5 class="card-title">Video 5</h5>
          </div>
        </div>
      </div>

      <!-- Video 6 -->
      <div class="col-md-6">
        <div class="card shadow">
          <div class="video-container">
            <iframe src="https://drive.google.com/file/d/ID_VIDEO6/preview"></iframe>
          </div>
          <div class="card-body text-center">
            <h5 class="card-title">Video 6</h5>
          </div>
        </div>
      </div>
    </section>

    <!-- Noticias (últimas) -->
    <section class="my-5">
      <h2 class="text-center mb-3" style="color:#0b1a33;"><i class="bi bi-newspaper"></i> NOTICIAS</h2>
      <div id="anomalias" class="row g-3">
        <p class="text-muted">Cargando noticias...</p>
      </div>
      <p id="ultima-actualizacion" class="text-muted text-center mt-2"></p>
    </section>

  </main>

  <!-- Scripts -->
  <script src="weather-config.js"></script>
  <!-- ... resto de tus scripts igual ... -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
